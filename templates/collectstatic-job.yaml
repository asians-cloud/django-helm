# collectstatic-job.yaml
#
# Runs as a helm POST-install/POST-upgrade hook so it executes AFTER the release's
# normal resources exist — in particular the `<fullname>-config` ConfigMap it reads
# via envFrom. (As a pre-install hook it deadlocked on a FRESH install: the hook ran
# before the ConfigMap was created -> "configmap not found" -> helm hangs.) Being a
# hook still keeps it out of `helm upgrade --wait`'s resource polling, avoiding the
# old ttl-delete "Job ... NotFound" race.
#
# - hook-delete-policy: before-hook-creation deletes any prior Job with the
#   same name before creating a fresh one (no AlreadyExists errors on retry).
# - hook-delete-policy: hook-succeeded cleans up the Job after success.
# - hook-weight: "5" runs it after lower-weighted post hooks.
#
# Web mode only — celery workers and tgbots don't serve static files.
{{- if not (or .Values.celerypy.enabled .Values.commands) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "django.fullname" . }}-collectstatic-job
  labels:
    app.kubernetes.io/name: {{ include "django.fullname" . }}
    helm.sh/chart: {{ include "django.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        command: ['python3', 'manage.py', 'collectstatic', '--noinput', '--ignore', 'node_modules']
        envFrom:
          - configMapRef:
              name: {{ include "django.fullname" . }}-config
      restartPolicy: Never
  backoffLimit: 4
{{- end }}
