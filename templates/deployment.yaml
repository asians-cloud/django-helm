apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "django.fullname" . }}
  labels:
    app: {{ include "django.fullname" . }}
    {{- include "django.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: 1
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
{{- end }}
  selector:
    matchLabels:
      {{- include "django.selectorLabels" . | nindent 6 }}
  template:
    metadata:
    {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      labels:
        app: {{ include "django.fullname" . }}
        {{- include "django.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "django.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.celerypy.enabled }}
      # ---- celery worker/beat mode ----
      {{- if .Values.pvc.enabled }}
      volumes:
        {{- toYaml .Values.pvc.volumes | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: "{{ .Chart.Name }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['/entrypoint', 'celery']
          args:
            {{- range .Values.deployment.args }}
            - {{ . }}
            {{- end }}
          {{- if eq .Values.celerypy.role "worker" }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "celery -A config.celery_app inspect ping -d celery@$HOSTNAME"]
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
          {{- end }}
          {{- if eq .Values.celerypy.role "beat" }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "celery -A config.celery_app status | grep -o ': OK'"]
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
          {{- end }}
          {{- if .Values.pvc.enabled }}
          volumeMounts:
            {{- toYaml .Values.pvc.volumeMounts | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "django.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- else if .Values.commands }}
      # ---- tgbot mode (one container per .Values.commands entry) ----
      {{- if .Values.pvc.enabled }}
      volumes:
        {{- toYaml .Values.pvc.volumes | nindent 8 }}
      {{- end }}
      containers:
        {{- range .Values.commands }}
        - name: "{{ .name }}"
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            {{- toYaml .command | nindent 12 }}
          args:
            {{- range .args }}
            - {{ . }}
            {{- end }}
          {{- if .livenessProbe }}
          livenessProbe:
            exec:
              command:
                {{- range .livenessProbe.command }}
                - {{ . }}
                {{- end }}
            initialDelaySeconds: 60
            periodSeconds: 3600
            timeoutSeconds: 60
          {{- end }}
          {{- if $.Values.pvc.enabled }}
          volumeMounts:
            {{- toYaml $.Values.pvc.volumeMounts | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "django.fullname" $ }}-config
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
        {{- end }}
      {{- else }}
      # ---- web mode (nginx + daphne) ----
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "django.fullname" . }}-sites-enabled-configmap
        - name: staticfiles
          emptyDir: {}
        {{- if .Values.pvc.enabled }}
        {{- toYaml .Values.pvc.volumes | nindent 8 }}
        {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          command: ["/entrypoint", "python3", "manage.py", "migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "django.fullname" . }}-config
        - name: collectstatic
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          command: ["/entrypoint", "python3", "manage.py", "collectstatic", "--noinput"]
          volumeMounts:
            - name: staticfiles
              mountPath: /var/www/html/
          envFrom:
            - configMapRef:
                name: {{ include "django.fullname" . }}-config
      containers:
        - name: nginx
          image: nginx:stable
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/
            - name: staticfiles # only necessary if serving staticfiles locally
              mountPath: /var/www/html/
          resources:
            requests:
              cpu: 10m
              memory: 500Mi
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/entrypoint", "/start"]
          ports:
            - name: daphne
              containerPort: 9000
              protocol: TCP
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- else }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 10
            failureThreshold: 5
          {{- end }}
          {{- if .Values.pvc.enabled }}
          volumeMounts:
            {{- toYaml .Values.pvc.volumeMounts | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "django.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
